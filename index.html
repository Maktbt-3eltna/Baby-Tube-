<html lang="ar" dir="rtl">  
<head>

  <title>بيبي تيوب</title>    <style>  
    :root{  
      --blue:#0b5ed7;  
      --card: rgba(11, 94, 215, .90);  
      --b1:#0b0b0b;  
      --b2:#151515;  
      --r:28px;  
    }  
    *{box-sizing:border-box}  
    html,body{height:100%}  
    body{  
      margin:0;  
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;  
      background: #071a2b url("bg.png") center / cover no-repeat fixed;  
    }  
    @media (max-width:768px){  
      body{ background-attachment: scroll; }  
    }  
  
    .wrap{max-width:520px;margin:0 auto;padding:16px 14px 44px}  
    .top{  
      text-align:center;font-weight:900;font-size:34px;margin:10px 0 18px;  
      color:#111;text-shadow:0 1px 0 rgba(255,255,255,.65)  
    }  
    .card{  
      background:var(--card);border-radius:var(--r);  
      padding:24px 14px 16px;  
      box-shadow:0 14px 28px rgba(0,0,0,.22);  
      border:1px solid rgba(255,255,255,.12)  
    }  
    .brand{text-align:center;color:#fff;margin-bottom:14px}  
    .brand h1{margin:0;font-size:44px;font-weight:900}  
    .brand p{margin:10px 0 0;font-size:18px;opacity:.9;font-weight:700}  
  
    .list{display:grid;gap:14px;padding:6px 6px 10px}  
  
    .ep-btn{  
      width:100%;border:0;cursor:pointer;  
      padding:22px 16px;border-radius:var(--r);  
      background:linear-gradient(180deg,var(--b2),var(--b1));  
      color:#fff;font-size:30px;font-weight:900;  
      box-shadow:0 10px 18px rgba(0,0,0,.26);  
      text-align:center;  
    }  
    .ep-btn:active{transform:scale(.99)}  
  
    .panel{  
      background:rgba(255,255,255,.98);  
      border-radius:18px;padding:14px;  
      box-shadow:0 12px 22px rgba(0,0,0,.16);  
      border:1px solid rgba(0,0,0,.06);  
      overflow:hidden;  
      animation: panelIn .22s ease both;  
      transform-origin: top;  
    }  
    @keyframes panelIn{  
      from{opacity:0; transform: translateY(-6px) scaleY(.985);}  
      to{opacity:1; transform: translateY(0) scaleY(1);}  
    }  
  
    .placeholder{  
      width:100%;aspect-ratio:16/9;border-radius:16px;  
      border:1px dashed rgba(0,0,0,.2);  
      background:linear-gradient(135deg,#eef3ff,#f8faff);  
      display:grid;place-items:center;padding:10px;text-align:center;  
      font-weight:900;color:#1a2a44;  
    }  
    video{width:100%;display:block;border-radius:16px;background:#000}  
  
    .dl{  
      width:100%;margin-top:14px;padding:18px 16px;border:0;  
      cursor:pointer;border-radius:var(--r);  
      background:linear-gradient(180deg,var(--b2),var(--b1));  
      color:#fff;font-size:26px;font-weight:900;  
      box-shadow:0 10px 18px rgba(0,0,0,.26);  
    }  
    .dl:disabled{opacity:.55;cursor:not-allowed}  
  
    .note{margin-top:10px;font-size:12.5px;color:rgba(0,0,0,.7);text-align:center;line-height:1.6}  
  
    /* ===== Promo للحلقات 26..75 ===== */  
    .promo{  
      position:relative;  
      width:100%;  
      aspect-ratio:16/9;  
      border-radius:16px;  
      overflow:hidden;  
      background:#000;  
      border:1px solid rgba(0,0,0,.12);  
      display:block;  
      text-decoration:none;  
      color:#fff;  
    }  
    .promo::before{  
      content:"";  
      position:absolute; inset:0;  
      background:url("bg.png") center/cover no-repeat;  
      filter: saturate(1.1) contrast(1.05) brightness(.75);  
      transform: scale(1.05);  
    }  
    .promo::after{  
      content:"";  
      position:absolute; inset:0;  
      background:  
        radial-gradient(120% 80% at 50% 20%, rgba(255,255,255,.08), transparent 55%),  
        linear-gradient(to top, rgba(0,0,0,.72), rgba(0,0,0,.12));  
    }  
    .promo .badge{  
      position:absolute; top:14px; left:14px;  
      background: rgba(0,0,0,.55);  
      border:1px solid rgba(255,255,255,.18);  
      padding:8px 10px;  
      border-radius:999px;  
      font-weight:900;  
      font-size:13px;  
      backdrop-filter: blur(6px);  
      z-index:2;  
      display:flex; align-items:center; gap:8px;  
    }  
    .promo .tri{  
      width:0;height:0;  
      border-top:7px solid transparent;  
      border-bottom:7px solid transparent;  
      border-left:12px solid #fff;  
    }  
    .promo .frame{  
      position:absolute; inset:0;  
      z-index:2;  
      display:flex;  
      flex-direction:column;  
      justify-content:flex-end;  
      padding:16px;  
      gap:10px;  
    }  
    .promo .cinema-text{  
      font-weight:1000;  
      font-size:26px;  
      line-height:1.25;  
      text-shadow: 0 8px 22px rgba(0,0,0,.55);  
      transform: translateY(120%);  
      opacity:0;  
      animation: riseUp .65s cubic-bezier(.2,.9,.2,1) forwards;  
    }  
    @keyframes riseUp{ to { transform: translateY(0); opacity:1; } }  
  
    .promo .subline{  
      color:rgba(255,255,255,.88);  
      font-weight:800;  
      font-size:14px;  
      opacity:0;  
      transform: translateY(12px);  
      animation: subIn .55s ease forwards;  
      animation-delay:.18s;  
    }  
    @keyframes subIn{ to { opacity:1; transform: translateY(0); } }  
  
    .promo .cta{  
      margin-top:2px;  
      width:100%;  
      border-radius:16px;  
      padding:14px 14px;  
      font-weight:1000;  
      font-size:18px;  
      color:#101010;  
      background: linear-gradient(180deg, #ffffff, #e9f0ff);  
      box-shadow: 0 12px 26px rgba(0,0,0,.25);  
      text-align:center;  
    }  
  
    /* ===== إعلان تحت خالص ===== */  
    .bottom-ad{  
      display:block;  
      margin:14px 6px 2px;  
      text-decoration:none;  
      border-radius:22px;  
      overflow:hidden;  
      border:1px solid rgba(255,255,255,.18);  
      box-shadow:0 14px 30px rgba(0,0,0,.22);  
      background: rgba(0,0,0,.18);  
      transition: transform .18s ease, filter .18s ease;  
    }  
    .bottom-ad:hover{transform: translateY(-2px); filter: brightness(1.04)}  
    .bottom-ad .inner{  
      padding:16px 16px;  
      display:flex;  
      align-items:center;  
      justify-content:space-between;  
      gap:14px;  
      background: rgba(11, 94, 215, .18);  
      backdrop-filter: blur(8px);  
      color:#fff;  
      font-weight:1000;  
      font-size:18px;  
      text-shadow: 0 10px 28px rgba(0,0,0,.45);  
    }  
    .bottom-ad .pill{  
      flex:0 0 auto;  
      padding:10px 12px;  
      border-radius:999px;  
      color:#111;  
      font-weight:1000;  
      background: linear-gradient(180deg, #ffffff, #e9f0ff);  
      border:1px solid rgba(255,255,255,.65);  
      white-space:nowrap;  
    }

  </div>    <script>  
    const list = document.getElementById("list");  
    const FB_LINK = "https://www.facebook.com/share/14WiyqiTqZE/?mibextid=wwXIfr";  
  
    // فتح تحت نفس الحلقة + يقفل أي حلقة تانية  
    list.addEventListener("click", (e) => {  
      const btn = e.target.closest(".ep-btn");  
      if (!btn) return;  
  
      const item = btn.parentElement;  
      const panel = item.querySelector(".panel");  
      const media = panel.querySelector(".media");  
      const dlBtn = panel.querySelector(".dl");  
      const note = panel.querySelector(".note");  
  
      // اقفل الباقي  
      list.querySelectorAll(".panel").forEach(p => { if (p !== panel) p.hidden = true; });  
  
      // toggle  
      panel.hidden = !panel.hidden;  
      if (panel.hidden) return;  
  
      const ep = Number(btn.dataset.ep);  
      const videoUrl = (btn.dataset.video || "").trim();  
      const downloadUrl = (btn.dataset.download || "").trim();  
      const finalUrl = downloadUrl || videoUrl;  
  
      // الحلقات من 26 لحد 75: Promo بدل الفيديو  
      if (ep >= 26) {  
        media.innerHTML = `  
          <a class="promo" href="${FB_LINK}" target="_blank" rel="noopener noreferrer">  
            <div class="badge"><span class="tri"></span> محتوى مميز</div>  
            <div class="frame">  
              <div class="cinema-text">اشترك في الباقه الجديده🗿</div>  
              <div class="subline">اضغط هنا علشان تكمل باقي الحلقات</div>  
              <div class="cta">افتح صفحة الاشتراك</div>  
            </div>  
          </a>  
        `;  
        dlBtn.disabled = true;  
        note.textContent = "هذه الحلقة ضمن الباقة الجديدة.";  
        setTimeout(() => panel.scrollIntoView({behavior:"smooth", block:"nearest"}), 10);  
        return;  
      }  
  
      // الحلقات 1..25: فيديو  
      if (videoUrl){  
        media.innerHTML = `<video controls preload="metadata" src="${videoUrl}"></video>`;  
        note.textContent = " ";  
      } else {  
        media.innerHTML = `<div class="placeholder">مكان الفيديو هنا<br><span style="font-weight:700;opacity:.75;font-size:13px;">(لسه مفيش فيديو مضاف)</span></div>`;  
        note.textContent = "مفيش روابط مضافة للحلقة دي لسه.";  
      }  
  
      dlBtn.disabled = !finalUrl;  
  
      dlBtn.onclick = () => {  
        if (!finalUrl) return;  
        const filename = `episode-${String(ep).padStart(2,"0")}.mp4`;  
        const a = document.createElement("a");  
        a.href = finalUrl;  
        a.download = filename;  
        a.target = "_blank";  
        a.rel = "noopener noreferrer";  
        document.body.appendChild(a);  
        a.click();  
        a.remove();  
      };  
  
      setTimeout(() => panel.scrollIntoView({behavior:"smooth", block:"nearest"}), 10);  
    });  
  </script>  </body>
